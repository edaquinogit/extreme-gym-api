spring.application.name=extreme-gym-api

spring.datasource.url=jdbc:postgresql://localhost:5432/extreme_db
spring.datasource.username=extreme_user
spring.datasource.password=extreme_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080
