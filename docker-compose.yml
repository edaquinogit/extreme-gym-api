services:
  postgres:
    image: postgres:16
    container_name: extreme-postgres
    environment:
      POSTGRES_DB: extreme_db
      POSTGRES_USER: extreme_user
      POSTGRES_PASSWORD: extreme_pass
    ports:
      - "5432:5432"
    volumes:
      - extreme_data:/var/lib/postgresql/data
    networks:
      - extreme-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extreme_user -d extreme_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extreme-gym-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/extreme_db
      SPRING_DATASOURCE_USERNAME: extreme_user
      SPRING_DATASOURCE_PASSWORD: extreme_pass
    ports:
      - "8080:8080"
    networks:
      - extreme-network

volumes:
  extreme_data:

networks:
  extreme-network:
    driver: bridge
